  <header class="container-fluid" ondragstart="return false;" ondrop="return false;">
    <div class="row">
      <div class="col-4 col-content-lg-2 characterImage">
        <img class="" src="{{actor.img}}" title="{{actor.name}}" data-edit="img" data-action="editImage">
      </div>
      <div class="col-6 col-content-lg-10">
        <div class="row">
          <div class="col-12">
            <label class="nameField">
              <input name="name" type="text" value="{{actor.name}}"
                     placeholder="{{localize 'Character Name'}}">
              <span>{{localize "Name"}}</span>
            </label>
          </div>
        </div>
        <div class="row">
          <div class="col-6">
            <label>
              <div class="input">{{localize system.status.rank.value.name}}</div>
              <span>{{localize "SHEET.Rank"}}</span>
            </label>
          </div>
          <div class="col-6">
            <label>
              <input class="rankPoints changeStatusValue"
                     data-stateid="rankPoints" type="number" value="{{system.status.rankPoints.value}}"
                     placeholder="{{localize 'SHEET.RankPoints'}}"
                     min="0"
                     step="1"
              >
              <span>{{localize "SHEET.RankPoints"}}</span>
            </label>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12 col-content-lg-4">
        <label>
          <input
              type="number" value="{{system.info.dodge.value}}"
              readonly="readonly"
          >
          <span>{{localize "SHEET.DefenceDodge"}}</span>
          <a class="skill-roll-by-internalId roll-button" data-skill="dodge">
            <i class="fa-solid fa-dice-d10"></i>
          </a>
        </label>
      </div>
      <div class="col-12 col-content-lg-4">
        <label>
          <input
              type="number" value="{{system.info.initiative.value}}"
              readonly="readonly"
          >
          <a class="skill-roll-by-internalId roll-button" data-skill="tactics">
            <i class="fa-solid fa-dice-d10"></i>
          </a>
          <span>{{localize "SHEET.InitiativeTactics"}}</span>
        </label>
      </div>
      <div class="col-12 col-content-lg-4">
        <label>
          <input
                  type="number" value="{{system.info.parry.value}}"
              readonly="readonly"
          >
          <a class="skill-roll-by-internalId roll-button" data-skill="parry">
            <i class="fa-solid fa-dice-d10"></i>
          </a>
          <span>{{localize "SHEET.DefenceParry"}}</span>
        </label>
      </div>
    </div>
    <div class="row">
      <div class="col-12 col-content-lg-6">
        <div class="row">
          <div class="col-6">
            <label class="karma">
              <input class=""
                     name="system.status.karma.value"
                     type="number" value="{{system.status.karma.value}}"
                     max="{{system.status.rank.value.karmaPoints}}"
                     min="0"
                     step="1"
              >
              <span>{{localize "SHEET.Karma"}}</span>
            </label>
          </div>
          <div class="col-6">
            <label class="karma">
              <input type="number"
                     value="{{system.status.rank.value.karmaPoints}}"
                     readonly="readonly"
              >
              <span>{{localize "SHEET.Max"}}</span>
            </label>
          </div>
          <div class="col-6">
            <label class="karma">
              <input class=""
                     name="system.status.karmaCyber.value"
                     type="number" value="{{system.status.karmaCyber.value}}"
                     min="0"
                     max="{{system.status.karmaCyberMax.value}}"
                     step="1"
              >
              <span>{{localize "SHEET.KarmaCyber"}}</span>
            </label>
          </div>
          <div class="col-6">
            <label class="karma">
              <input type="number"
                     min="0"
                     step="1"
                     name="system.status.karmaCyberMax.value"
                     value="{{system.status.karmaCyberMax.value}}"
              >
              <span>{{localize "SHEET.Max"}}</span>
            </label>
          </div>
        </div>
      </div>
      <div class="col-12 col-content-lg-6">
        <div class="row">
          <div class="col-6">
            <label class="endurance">
              <input class=""
                     name="system.status.endurance.value"
                     type="number" value="{{system.status.endurance.value}}"
                     max="{{system.status.rank.value.endurance}}"
                     step="1"
              >
              <span>{{localize "SHEET.Endurance"}}</span>
            </label>
          </div>
          <div class="col-6">
            <label class="endurance">
              <input type="number"
                     value="{{system.status.rank.value.endurance}}"
                     readonly="readonly"
              >
              <span>{{localize "SHEET.Max"}}</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </header>
